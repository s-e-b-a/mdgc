services:
  db:
    image: mysql:8.0
    container_name: inventory_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: inventory
      MYSQL_USER: inventory_user
      MYSQL_PASSWORD: inventory_password
    ports:
      - "3306:3306"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    image: node:22-alpine
    container_name: inventory_backend
    ports:
      - "8080:8080"
    working_dir: /app
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=mysql://inventory_user:inventory_password@db:3306/inventory
      - PORT=8080
    command: >
      sh -c "npm install && npx prisma generate && npm run dev"
    depends_on:
      - db

  frontend:
    build: ./frontend
    image: node:22-alpine
    container_name: inventory_frontend
    ports:
      - "5173:5173"
    working_dir: /app
    volumes:
      - ./frontend:/app
    environment:
      - VITE_API_BASE_URL=http://localhost:8080/api
    command: >
      sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend

volumes:
  db_data:
